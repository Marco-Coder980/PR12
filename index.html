<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Carousel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="carousel" id="carousel">
    <div class="carousel-track" id="track">
      <div class="slide" style="background:#e76f51">Slide 1</div>
      <div class="slide" style="background:#2a9d8f">Slide 2</div>
      <div class="slide" style="background:#264653">Slide 3</div>
      <div class="slide" style="background:#e9c46a">Slide 4</div>
    </div>

    <button class="btn prev" id="prevBtn" aria-label="Previous slide">&#10094;</button>
    <button class="btn next" id="nextBtn" aria-label="Next slide">&#10095;</button>

    <div class="dots" id="dots"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
